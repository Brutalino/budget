<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#38240D">
<title>Budget — Fabio</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  /* ── Chocolate Truffle ── */
  --bg: #2A1A0B;       /* page — espresso scuro */
  --bg2: #3A2712;      /* card */
  --bg3: #4C351A;      /* input / elevato */
  --espresso: #38240D; /* nav / più scuro */
  --border: rgba(253,251,212,0.08);
  --border2: rgba(253,251,212,0.16);
  --text: #FDFBD4;     /* crema */
  --text2: rgba(253,251,212,0.66);
  --text3: rgba(253,251,212,0.42);
  --caramel: #C05800;  /* accento / brand */
  --green: #9CB36B;          /* oliva morbido — positivo */
  --green-dim: rgba(156,179,107,0.15);
  --red: #D2603A;            /* terracotta — negativo */
  --red-dim: rgba(210,96,58,0.15);
  --amber: #E0922E;          /* ambra calda — attenzione */
  --amber-dim: rgba(224,146,46,0.15);
  --blue: #C05800;           /* "investimento" → caramel */
  --blue-dim: rgba(192,88,0,0.16);
  --radius: 16px;
  --radius-sm: 11px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  background-image: radial-gradient(135% 90% at 50% -10%, #43300F 0%, #2A1A0B 55%, #20140A 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ── NAV ── */
nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(42,26,11,0.82);
  backdrop-filter: blur(22px) saturate(1.2);
  -webkit-backdrop-filter: blur(22px) saturate(1.2);
  border-top: 0.5px solid var(--border2);
  display: flex;
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
}
nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text3);
  font-family: var(--font);
  font-size: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 0;
  transition: color .4s var(--ease);
}
nav button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; transition: transform .45s var(--ease); }
nav button.active { color: var(--caramel); }
nav button.active svg { transform: translateY(-1px) scale(1.12); }

/* ── PAGES ── */
.page { display: none; padding: 16px 16px 100px; max-width: 680px; margin: 0 auto; }
.page.active { display: block; }

/* ── HEADER ── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 8px; }
.page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-nav button { background: var(--bg2); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.month-nav button svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.month-nav .month-label { font-size: 15px; font-weight: 500; min-width: 140px; text-align: center; }

/* ── METRICS GRID ── */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.metric { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
.metric .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.metric .val { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
.metric .sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.val.green { color: var(--green); }
.val.red { color: var(--red); }
.val.amber { color: var(--amber); }

/* ── CARDS ── */
.card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 0 rgba(253,251,212,0.04) inset, 0 14px 30px -22px rgba(0,0,0,0.85); }
.card-header { padding: 14px 16px 0; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
.card-body { padding: 10px 0; }

.row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 0.5px solid var(--border); }
.row:last-child { border-bottom: none; }
.row .name { flex: 1; font-size: 14px; color: var(--text2); }
.row .name strong { color: var(--text); font-weight: 500; display: block; }
.row .amt { font-size: 14px; font-weight: 500; }
.row .amt.neg { color: var(--red); }
.row .amt.pos { color: var(--green); }

.badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
.badge-sfizi { background: var(--amber-dim); color: var(--amber); }
.badge-uscite { background: var(--green-dim); color: var(--green); }
.badge-tech { background: var(--blue-dim); color: var(--blue); }
.badge-alimentare { background: rgba(167,243,208,0.12); color: #6ee7b7; }
.badge-trasporti { background: rgba(196,181,253,0.12); color: #c4b5fd; }
.badge-salute { background: rgba(253,164,175,0.12); color: #fda4af; }
.badge-abbigliamento { background: rgba(203,213,225,0.12); color: #94a3b8; }
.badge-signora { background: rgba(244,114,182,0.14); color: #f472b6; }
.badge-giochi { background: rgba(167,139,250,0.14); color: #a78bfa; }
.badge-techperso { background: rgba(34,211,238,0.14); color: #22d3ee; }
.badge-regalome { background: rgba(45,212,191,0.14); color: #2dd4bf; }
.badge-regalolei { background: rgba(251,113,133,0.14); color: #fb7185; }
.badge-regalialtri { background: rgba(251,146,60,0.14); color: #fb923c; }
.badge-altro { background: rgba(148,163,184,0.1); color: var(--text3); }
.badge-oneoff { background: var(--amber-dim); color: var(--amber); }
.badge-obiettivo { background: var(--green-dim); color: var(--green); }
.badge-inv { background: var(--blue-dim); color: var(--blue); }

/* ── PROGRESS ── */
.progress-wrap { padding: 14px 16px; }
.progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.progress-top .p-name { font-size: 14px; font-weight: 500; color: var(--text); }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .9s var(--ease), background .6s ease; }
.progress-bottom { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--text3); }

/* ── FORM ── */
.form-section { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
input, select, textarea {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 14px;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
}
input, select, textarea { transition: border-color .35s ease, background .35s ease; }
input:focus, select:focus { border-color: var(--caramel); }
select option { background: var(--bg2); }

.btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 13px; background: var(--caramel); color: #FDFBD4; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px -10px rgba(192,88,0,0.7); transition: transform .35s var(--ease), box-shadow .35s ease, opacity .35s ease, filter .35s ease; }
.btn:active { transform: scale(0.975); filter: brightness(0.94); box-shadow: 0 4px 12px -8px rgba(192,88,0,0.7); }
.btn-ghost { background: var(--bg3); color: var(--text2); box-shadow: none; }

.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; display: flex; align-items: center; }
.del-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; }
.del-btn:active { color: var(--red); }

/* ── SECTION LABEL ── */
.section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; padding: 6px 0; margin-bottom: 4px; border-bottom: 0.5px solid var(--border); margin-top: 4px; }
.section-label:first-child { margin-top: 0; }

/* ── UPDATE SAVED ── */
.update-row { display: flex; gap: 8px; padding: 12px 16px 14px; }
.update-row input { flex: 1; }
.update-row button { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 0 14px; font-family: var(--font); font-size: 13px; cursor: pointer; white-space: nowrap; }

/* ── LOG ── */
.log-entry { padding: 10px 16px; border-bottom: 0.5px solid var(--border); }
.log-entry:last-child { border-bottom: none; }
.log-time { font-size: 11px; color: var(--text3); display: block; margin-bottom: 2px; }
.log-msg { font-size: 13px; color: var(--text2); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 28px; font-size: 14px; color: var(--text3); }

/* ── BUDGET BAR ── */
.budget-bar-wrap { padding: 12px 16px; }
.budget-bar-lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.budget-bar { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }

/* ── TOAST ── */
.toast { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-12px); background: var(--bg2); border: 0.5px solid var(--border2); color: var(--text); padding: 11px 20px; border-radius: var(--radius); font-size: 13px; z-index: 999; opacity: 0; box-shadow: 0 16px 36px -18px rgba(0,0,0,0.85); transition: opacity .45s var(--ease), transform .45s var(--ease); pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 520px) {
  .metrics { grid-template-columns: repeat(4, 1fr); }
}

/* ── EDITOR FISSE / RISPARMIO ── */
.mini-btn { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 12px; font-family: var(--font); cursor: pointer; white-space: nowrap; }
.mini-btn:active { opacity: .8; }
.mini-btn.on { background: var(--green-dim); color: var(--green); border-color: transparent; }
.mini-btn.danger:active { color: var(--red); }
.fx-panel { padding: 12px 16px; background: rgba(0,0,0,0.18); border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.fx-row2 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.fx-row2 input, .fx-row2 select { flex: 1; min-width: 90px; }
.paid-tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; background: var(--green-dim); color: var(--green); margin-left: 6px; }

/* ── LOGIN ── */
.login-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
.login-box { width: 100%; max-width: 340px; }
.login-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.login-box p { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.login-box input { margin-bottom: 10px; }
.login-err { color: var(--red); font-size: 13px; min-height: 18px; margin-top: 8px; }

/* ── ICON BTN / DOT / COLOR ── */
.icon-btn { background: var(--bg2); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.icon-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.dot { width: 12px; height: 12px; border-radius: 99px; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(253,251,212,0.05); }
input[type=color] { padding: 2px; height: 38px; cursor: pointer; }

/* ── TOGGLE stile iOS ── */
.switch { position: relative; display: inline-block; width: 48px; height: 29px; flex-shrink: 0; }
.switch input { position: absolute; opacity: 0; width: 0; height: 0; }
.switch .slider { position: absolute; inset: 0; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 99px; cursor: pointer; transition: background .45s var(--ease), border-color .45s var(--ease); }
.switch .slider::before { content: ""; position: absolute; height: 23px; width: 23px; left: 3px; top: 50%; transform: translateY(-50%); background: #FDFBD4; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.45); transition: transform .45s var(--ease); }
.switch input:checked + .slider { background: var(--caramel); border-color: transparent; }
.switch input:checked + .slider::before { transform: translate(19px, -50%); }
.switch input:active + .slider::before { width: 26px; }

/* ── ANIMAZIONI · lente e rilassanti ── */
@keyframes pageIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page.active { animation: pageIn .6s var(--ease) both; }
.fx-panel { animation: panelIn .5s var(--ease) both; }

/* apertura "a scomparsa" della sezione Allocazione mensile */
@keyframes unfold {
  from { max-height: 0; opacity: 0; transform: translateY(-8px); }
  to   { max-height: 3000px; opacity: 1; transform: translateY(0); }
}
.alloc-unfold { overflow: hidden; animation: unfold .7s var(--ease) both; }
.alloc-caret { display: inline-block; transition: transform .5s var(--ease); }
.alloc-caret.open { transform: rotate(180deg); }

/* feedback al tocco — morbido, mai istantaneo */
.metric { transition: transform .4s var(--ease), border-color .4s ease, background .4s ease; }
.row { transition: background .4s ease; }
.card-header { transition: color .4s ease; }
.mini-btn { transition: background .35s ease, color .35s ease, border-color .35s ease, transform .3s var(--ease); }
.mini-btn:active { transform: scale(0.955); }
.month-nav button, .icon-btn { transition: background .35s ease, color .35s ease, transform .3s var(--ease); }
.month-nav button:active, .icon-btn:active { transform: scale(0.9); }
.del-btn { transition: color .4s ease, transform .3s var(--ease); }
.del-btn:active { transform: scale(0.88); }
.badge { transition: background .4s ease, color .4s ease; }
.progress-bar, .budget-bar { transition: background .5s ease; }

@media (prefers-reduced-motion: reduce) {
  *, .page.active, .fx-panel { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-dashboard" class="page active"></div>
<div id="page-spese" class="page"></div>
<div id="page-resoconto" class="page"></div>
<div id="page-obiettivi" class="page"></div>
<div id="page-log" class="page"></div>
<div id="page-impostazioni" class="page"></div>

<!-- NAV -->
<nav>
  <button class="active" onclick="showPage('dashboard')" id="nav-dashboard">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </button>
  <button onclick="showPage('spese')" id="nav-spese">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Spese
  </button>
  <button onclick="showPage('resoconto')" id="nav-resoconto">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Resoconto
  </button>
  <button onclick="showPage('obiettivi')" id="nav-obiettivi">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
    Obiettivi
  </button>
  <button onclick="showPage('log')" id="nav-log">
    <svg viewBox="0 0 24 24"><path d="M9 12h6M9 16h4M6 3h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>
    Storico
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>Budget</h2>
    <p>Accedi per sincronizzare i tuoi dati.</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="username" inputmode="email">
    <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
